name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          rebar3-version: "3.24"

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: ${{ runner.os }}-rebar3-${{ hashFiles('rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-rebar3-

      - name: Compile
        run: rebar3 compile

      - name: Run tests
        run: rebar3 eunit
